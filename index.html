<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velib</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0066cc">
    <meta name="apple-mobile-web-app-capable" content="yes">
</head>

<body>
    <div id="mainPage">
        <div class="title-container">
            <h1>Velib shortcut</h1>
            <button id="refresh" class="refresh-button">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="icon refresh" aria-hidden="true">
                    <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"></path>
                    <path d="M21 3v5h-5"></path>
                    <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"></path>
                    <path d="M8 16H3v5"></path>
                </svg>
            </button>
        </div>
        <div id="half-pane-container" class="container-row-space-around">
            <!-- Les stations seront générées dynamiquement par JavaScript -->
        </div>
        <div class="pane bottom-pane">
            <button id="update-station-data" class="apple-style-button">Changer de stations</button>
            <button id="delete-data" class="apple-style-button">Supprimer les données</button>
        </div>
        <div>
            <p>Développé par <a href="https://florianlatapie.github.io/" target="_blank">Florian Latapie</a></p>
            <br/>
            <p>Données <a href="https://www.velib-metropole.fr/donnees-open-data-gbfs-du-service-velib-metropole" target="_blank">Données Open Data (GBFS) - Vélib' Métropole</a>
            <br/>Et <a href="https://velibest.fr/" target="_blank">VeliBest</a>
            </p>
        </div>
    </div>
</body>

</html>
